<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>インベーダー</title>
<style>
html,body{height:100%;margin:0;overflow:hidden}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;gap:4px;font-family:monospace;color:#0f0}
canvas{border:2px solid #0f0;box-shadow:0 0 20px #0f0;max-width:100%;max-height:calc(100% - 1.25rem);width:auto;height:auto;display:block}
#info{flex-shrink:0;font-size:11px;line-height:1.2;margin:0}
</style>
</head>
<body>
<canvas id="c" width="640" height="480"></canvas>
<div id="info">←→ 移動 | スペース 発射 | R リスタート</div>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let player, invaders, bullets, enemyBullets, score, lives, wave, dir, gameOver, keys = {}, shootCooldown = 0, explosion = null;

function init(resetScore) {
  player = { x: 300, y: 450, w: 40, h: 20, speed: 5 };
  invaders = [];
  const cols = 10, rows = 5;
  const startX = (canvas.width - (cols * 40 - 10)) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      invaders.push({ x: startX + c * 40, y: 50 + r * 36, w: 28, h: 20, alive: true });
    }
  }
  bullets = [];
  enemyBullets = [];
  if (resetScore) {
    score = 0;
    lives = 3;
    wave = 1;
  }
  dir = 1;
  gameOver = false;
  shootCooldown = 0;
  explosion = null;
}

function nextWave() {
  wave++;
  const cols = Math.min(10, 8 + Math.floor(wave / 2));
  const rows = Math.min(5, 3 + Math.floor(wave / 3));
  invaders = [];
  const startX = (canvas.width - (cols * 40 - 10)) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      invaders.push({ x: startX + c * 40, y: 50 + r * 36, w: 28, h: 20, alive: true });
    }
  }
  bullets = [];
  enemyBullets = [];
  dir = 1;
  shootCooldown = 0;
}

function shoot() {
  if (shootCooldown <= 0) {
    bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10, speed: 8 });
    shootCooldown = 4;
  }
}

function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function startPlayerExplosion() {
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  const particles = [];
  for (let i = 0; i < 32; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 5.5;
    particles.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 2 + Math.random() * 4,
      life: 24 + Math.floor(Math.random() * 20),
      color: ["#ff0", "#fa0", "#f60", "#f00", "#0f0"][Math.floor(Math.random() * 5)]
    });
  }
  explosion = { cx, cy, frame: 0, duration: 50, particles };
}

function updateExplosion() {
  explosion.frame++;
  for (const p of explosion.particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.life--;
  }
  explosion.particles = explosion.particles.filter(p => p.life > 0);

  if (explosion.frame >= explosion.duration) {
    explosion = null;
    if (lives <= 0) {
      gameOver = true;
    } else {
      player.x = (canvas.width - player.w) / 2;
      player.y = 450;
    }
  }
}

function drawExplosion() {
  const t = explosion.frame / explosion.duration;
  const flashRadius = 8 + t * 36;
  const ringRadius = 4 + t * 28;

  ctx.save();
  ctx.globalAlpha = Math.max(0, 1 - t * 1.2);
  ctx.fillStyle = "#ff0";
  ctx.beginPath();
  ctx.arc(explosion.cx, explosion.cy, flashRadius * 0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#f80";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(explosion.cx, explosion.cy, ringRadius, 0, Math.PI * 2);
  ctx.stroke();

  for (const p of explosion.particles) {
    const alpha = Math.max(0, p.life / 30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.restore();
}

function update() {
  if (explosion) {
    updateExplosion();
    return;
  }
  if (gameOver) return;

  if (keys.ArrowLeft) player.x = Math.max(0, player.x - player.speed);
  if (keys.ArrowRight) player.x = Math.min(canvas.width - player.w, player.x + player.speed);
  if (shootCooldown > 0) shootCooldown--;
  if (keys.Space && !gameOver) shoot();

  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= bullets[i].speed;
    if (bullets[i].y + bullets[i].h < 0) {
      bullets.splice(i, 1);
      continue;
    }
    for (const inv of invaders) {
      if (!inv.alive) continue;
      const b = bullets[i];
      if (rectsOverlap(b.x, b.y, b.w, b.h, inv.x, inv.y, inv.w, inv.h)) {
        inv.alive = false;
        bullets.splice(i, 1);
        score += 10 * wave;
        break;
      }
    }
  }

  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.y += b.speed;
    if (b.y > canvas.height) {
      enemyBullets.splice(i, 1);
      continue;
    }
    if (rectsOverlap(b.x, b.y, b.w, b.h, player.x, player.y, player.w, player.h)) {
      enemyBullets.splice(i, 1);
      lives--;
      startPlayerExplosion();
    }
  }

  const aliveInvaders = invaders.filter(v => v.alive);
  if (aliveInvaders.length === 0) {
    nextWave();
    return;
  }

  const speed = 0.6 + wave * 0.15;
  const dropStep = 6;
  let hitEdge = false;
  for (const inv of aliveInvaders) {
    const nextX = inv.x + dir * speed;
    if (nextX <= 0 || nextX + inv.w >= canvas.width) {
      hitEdge = true;
      break;
    }
  }
  if (hitEdge) {
    dir *= -1;
    for (const inv of aliveInvaders) inv.y += dropStep;
  }
  for (const inv of aliveInvaders) inv.x += dir * speed;

  const bottomInvaders = [];
  const bottomByCol = {};
  for (const inv of aliveInvaders) {
    const col = Math.round(inv.x / 40);
    if (!bottomByCol[col] || inv.y > bottomByCol[col].y) bottomByCol[col] = inv;
  }
  for (const inv of Object.values(bottomByCol)) bottomInvaders.push(inv);

  let shootChance = 0.018 + wave * 0.005;
  if (aliveInvaders.length <= 20) shootChance *= 1.4;
  if (aliveInvaders.length <= 10) shootChance *= 1.3;

  function enemyShoot(shooter) {
    enemyBullets.push({
      x: shooter.x + shooter.w / 2 - 2,
      y: shooter.y + shooter.h,
      w: 4,
      h: 10,
      speed: 5 + wave * 0.6
    });
  }

  if (Math.random() < shootChance && bottomInvaders.length > 0) {
    const shooter = bottomInvaders[Math.floor(Math.random() * bottomInvaders.length)];
    enemyShoot(shooter);
    if (wave >= 2 && Math.random() < 0.35) {
      const second = bottomInvaders[Math.floor(Math.random() * bottomInvaders.length)];
      if (second !== shooter || bottomInvaders.length > 1) enemyShoot(second);
    }
  }

  if (invaders.some(v => v.alive && v.y + v.h >= player.y)) {
    gameOver = true;
  }
}

function drawInvader(x, y, w, h) {
  ctx.fillRect(x + w * 0.2, y, w * 0.6, h * 0.4);
  ctx.fillRect(x, y + h * 0.35, w, h * 0.35);
  ctx.fillRect(x + w * 0.1, y + h * 0.65, w * 0.25, h * 0.35);
  ctx.fillRect(x + w * 0.65, y + h * 0.65, w * 0.25, h * 0.35);
}

function drawPlayer(x, y, w, h) {
  ctx.beginPath();
  ctx.moveTo(x + w / 2, y);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.closePath();
  ctx.fill();
}

function drawLivesHUD() {
  const iconW = 16;
  const iconH = 9;
  const gap = 6;
  const padding = 10;
  const y = 10;
  const totalW = lives > 0 ? lives * iconW + (lives - 1) * gap : 0;
  const startX = canvas.width - padding - totalW;

  ctx.fillStyle = "#0f0";
  ctx.font = "12px monospace";
  ctx.textAlign = "right";
  ctx.fillText("LIVES", canvas.width - padding, y - 2);
  ctx.textAlign = "left";

  ctx.fillStyle = "#0f0";
  for (let i = 0; i < lives; i++) {
    drawPlayer(startX + i * (iconW + gap), y, iconW, iconH);
  }
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0f0";
  if (!explosion) drawPlayer(player.x, player.y, player.w, player.h);
  invaders.forEach(inv => {
    if (inv.alive) drawInvader(inv.x, inv.y, inv.w, inv.h);
  });

  ctx.fillStyle = "#fff";
  bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

  ctx.fillStyle = "#f00";
  enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

  if (explosion) drawExplosion();

  ctx.fillStyle = "#0f0";
  ctx.font = "16px monospace";
  ctx.fillText("SCORE:" + score + "  WAVE:" + wave, 10, 24);
  drawLivesHUD();

  if (gameOver) {
    ctx.textAlign = "center";
    ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
    ctx.fillText("Press R to restart", canvas.width / 2, canvas.height / 2 + 20);
    ctx.textAlign = "left";
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["ArrowLeft", "ArrowRight", "Space"].includes(e.code)) e.preventDefault();
  if (e.code === "KeyR" && gameOver) init(true);
});

document.addEventListener("keyup", e => {
  keys[e.code] = false;
});

init(true);
loop();
</script>
</body>
</html>
