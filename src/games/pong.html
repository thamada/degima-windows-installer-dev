<!DOCTYPE html><html><head><meta charset=UTF-8><title>ポン</title><style>body{margin:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:monospace;color:#0f0}canvas{border:2px solid #0f0;box-shadow:0 0 20px #0f0}#info{margin-top:10px}</style></head><body><canvas id=c width=640 height=480></canvas><div id=info>↑↓ 移動 | R リスタート</div><script>const canvas=document.getElementById("c"),ctx=canvas.getContext("2d");let paddleL,paddleR,ball,scoreL,scoreR,keys={};function init(){paddleL={x:20,y:200,w:10,h:80,speed:6};paddleR={x:610,y:200,w:10,h:80,speed:5};ball={x:320,y:240,r:8,dx:4,dy:2*(Math.random()>0.5?1:-1)};scoreL=0;scoreR=0;}function resetBall(){ball.x=320;ball.y=240;ball.dx=4*(Math.random()>0.5?1:-1);ball.dy=Math.random()*4-2;}function update(){if(keys.ArrowUp)paddleL.y=Math.max(0,paddleL.y-paddleL.speed);if(keys.ArrowDown)paddleL.y=Math.min(canvas.height-paddleL.h,paddleL.y+paddleL.speed);const cy=paddleR.y+paddleR.h/2;if(cy<ball.y-10)paddleR.y=Math.min(canvas.height-paddleR.h,paddleR.y+paddleR.speed);else if(cy>ball.y+10)paddleR.y=Math.max(0,paddleR.y-paddleR.speed);ball.x+=ball.dx;ball.y+=ball.dy;if(ball.y-ball.r<=0||ball.y+ball.r>=canvas.height)ball.dy*=-1;if(ball.dx<0&&ball.x-ball.r<=paddleL.x+paddleL.w&&ball.y>paddleL.y&&ball.y<paddleL.y+paddleL.h){ball.dx=Math.abs(ball.dx)*1.05;ball.x=paddleL.x+paddleL.w+ball.r;}if(ball.dx>0&&ball.x+ball.r>=paddleR.x&&ball.y>paddleR.y&&ball.y<paddleR.y+paddleR.h){ball.dx=-Math.abs(ball.dx)*1.05;ball.x=paddleR.x-ball.r;}if(ball.x<0){scoreR++;resetBall();}if(ball.x>canvas.width){scoreL++;resetBall();}}function draw(){ctx.fillStyle="#000";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="#0f0";ctx.setLineDash([5,15]);ctx.beginPath();ctx.moveTo(320,0);ctx.lineTo(320,480);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle="#0f0";ctx.fillRect(paddleL.x,paddleL.y,paddleL.w,paddleL.h);ctx.fillRect(paddleR.x,paddleR.y,paddleR.w,paddleR.h);ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.font="16px monospace";ctx.fillText(scoreL+" - "+scoreR,300,30);}function loop(){update();draw();requestAnimationFrame(loop);}document.addEventListener("keydown",e=>{keys[e.code]=true;if(e.code==="KeyR")init();});document.addEventListener("keyup",e=>keys[e.code]=false);init();loop();</script></body></html>
