<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メビウス</title>
<style>
html, body { height: 100%; margin: 0; overflow: hidden; }
body {
  background: #020612;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px;
  gap: 4px;
  font-family: monospace;
  color: #0f0;
}
canvas {
  border: 2px solid #59d7ff;
  box-shadow: 0 0 18px rgba(89, 215, 255, 0.7);
  max-width: 100%;
  max-height: calc(100% - 1.25rem);
  width: auto;
  height: auto;
  display: block;
}
#info { flex-shrink: 0; font-size: 11px; line-height: 1.2; margin: 0; }
</style>
</head>
<body>
<canvas id="c" width="640" height="480"></canvas>
<div id="info">←→↑↓ 移動 | スペース 対空 | X 対地 | アイテムで武器強化・バリア・無敵・誘導弾・山火事 | R リスタート</div>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;
const SCROLL_SPEED = 1.2;
const WORLD_H = 4800;

let player, zappers, blasters, flames, missiles, airEnemies, groundTargets, enemyBullets, items;
let scrollY, score, lives, wave, gameOver, keys = {}, shootCooldown = 0, bombCooldown = 0;
let explosion = null, spawnTimer = 0, groundSpawnTimer = 0, wildfire = null, legendFadeTimer = 0;
const WEAPON_DURATION = 540;
const INVINCIBLE_DURATION = 480;
const WILDFIRE_DURATION = 180;
const LEGEND_FADE_FRAMES = 600;
const POWERUP_DROP_RATE = 0.17;
const MAX_BARRIER = 8;
const FUNNEL_LEVELS = [
  null,
  { count: 2, speed: 6, vy: -4.5, turnRate: 0.15, damage: 2, interval: 22 },
  { count: 4, speed: 12, vy: -9, turnRate: 0.15, damage: 2, interval: 22 },
  { count: 6, speed: 18, vy: -13.5, turnRate: 0.18, damage: 2, interval: 20 },
  { count: 8, speed: 24, vy: -18, turnRate: 0.22, damage: 3, interval: 18 }
];
const FUNNEL_ITEM_COLORS = ["#f88", "#f66", "#f44", "#ffd060"];
const STARTING_LOADOUT = {
  radBeam: true,
  flame: true,
  barrier8: true,
  invincibleStar: true
};

function applyStartingLoadout() {
  if (STARTING_LOADOUT.radBeam) {
    player.airWeapon = "radBeam";
    player.airWeaponTimer = WEAPON_DURATION;
  }
  if (STARTING_LOADOUT.flame) {
    player.groundWeapon = "flame";
    player.groundWeaponTimer = WEAPON_DURATION;
  }
  if (STARTING_LOADOUT.barrier8) {
    player.barrier = MAX_BARRIER;
  }
  if (STARTING_LOADOUT.invincibleStar) {
    player.invincibleTimer = INVINCIBLE_DURATION;
  }
}

function resetLegendFade() {
  legendFadeTimer = LEGEND_FADE_FRAMES;
}

function updateLegendFade() {
  if (legendFadeTimer > 0) legendFadeTimer--;
}

function getLegendAlpha() {
  return Math.max(0, legendFadeTimer / LEGEND_FADE_FRAMES);
}

function init(resetScore) {
  player = {
    x: W / 2 - 16, y: H - 76, w: 32, h: 36, speed: 4.5, bank: 0, afterburner: 0, afterburnerFrame: 0,
    airWeapon: "normal", groundWeapon: "normal", airWeaponTimer: 0, groundWeaponTimer: 0,
    missileWeaponTimer: 0, missileLaunchTimer: 0, missileLevel: 0,
    barrier: 0, barrierFlash: 0, invincibleTimer: 0
  };
  zappers = [];
  blasters = [];
  flames = [];
  missiles = [];
  airEnemies = [];
  groundTargets = [];
  enemyBullets = [];
  items = [];
  scrollY = 0;
  if (resetScore) {
    score = 0;
    lives = 4;
    wave = 1;
  }
  gameOver = false;
  shootCooldown = 0;
  bombCooldown = 0;
  explosion = null;
  spawnTimer = 0;
  groundSpawnTimer = 0;
  wildfire = null;
  applyStartingLoadout();
  seedInitialGround();
  resetLegendFade();
}

function seedInitialGround() {
  for (let y = -40; y < H; y += 70 + Math.floor(Math.random() * 75)) {
    if (Math.random() < 0.82) spawnGroundTarget(y);
  }
}

function spawnGroundTarget(worldY) {
  const specs = [
    { type: "tank", w: 36, h: 20, hp: 1, score: 200, weight: 34 },
    { type: "aaGun", w: 34, h: 30, hp: 1, score: 350, weight: 23, fireCooldown: 35 },
    { type: "pillbox", w: 42, h: 26, hp: 2, score: 400, weight: 20 },
    { type: "smallFortress", w: 54, h: 34, hp: 3, score: 700, weight: 16 },
    { type: "giantFortress", w: 86, h: 56, hp: 6, score: 1500, weight: 7, fireCooldown: 55 }
  ];
  const totalWeight = specs.reduce((sum, spec) => sum + spec.weight, 0);
  let pick = Math.random() * totalWeight;
  let spec = specs[0];
  for (const candidate of specs) {
    pick -= candidate.weight;
    if (pick <= 0) {
      spec = candidate;
      break;
    }
  }

  groundTargets.push({
    worldY,
    x: 24 + Math.random() * (W - spec.w - 48),
    w: spec.w,
    h: spec.h,
    type: spec.type,
    hp: spec.hp,
    fireCooldown: spec.fireCooldown ? spec.fireCooldown + Math.floor(Math.random() * 45) : 0,
    alive: true,
    score: spec.score
  });
}

function spawnAirEnemy() {
  const patterns = ["straight", "sine", "dive"];
  const pattern = patterns[Math.floor(Math.random() * patterns.length)];
  const kind = Math.random() < 0.35 ? "large" : "small";
  airEnemies.push({
    x: 30 + Math.random() * (W - 60),
    y: -30,
    w: kind === "large" ? 32 : 22,
    h: kind === "large" ? 24 : 18,
    kind,
    pattern,
    phase: Math.random() * Math.PI * 2,
    baseX: 30 + Math.random() * (W - 60),
    speedY: kind === "large" ? 1.2 + wave * 0.08 : 2 + wave * 0.12,
    speedX: 0,
    hp: kind === "large" ? 2 : 1,
    alive: true,
    score: kind === "large" ? 150 : 80,
    shootTimer: 60 + Math.floor(Math.random() * 90)
  });
}

function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function worldToScreen(worldY) {
  return worldY + scrollY;
}

function pickPowerUpType() {
  const roll = Math.random();
  if (roll < 0.10) return "radBeam";
  if (roll < 0.20) return "flame";
  if (roll < 0.27) return "funnelMissile1";
  if (roll < 0.31) return "funnelMissile2";
  if (roll < 0.34) return "funnelMissile3";
  if (roll < 0.36) return "funnelMissile4";
  if (roll < 0.50) return "barrier1";
  if (roll < 0.64) return "barrier2";
  if (roll < 0.75) return "barrier8";
  if (roll < 0.77) return "wildfire";
  return "invincibleStar";
}

function getFunnelMissileLevelFromItem(type) {
  if (type === "funnelMissile") return 1;
  const level = parseInt(type.replace("funnelMissile", ""), 10);
  return level >= 1 && level <= 4 ? level : 1;
}

function isFunnelMissileItem(type) {
  return type === "funnelMissile" || type.startsWith("funnelMissile");
}

function spawnPowerUp(x, y) {
  items.push({
    x: x - 10,
    y: y - 10,
    w: 20,
    h: 20,
    type: pickPowerUpType(),
    bob: Math.random() * Math.PI * 2,
    timer: 0,
    life: 480
  });
}

function applyBarrierItem(type) {
  if (type === "barrier1") player.barrier = Math.min(MAX_BARRIER, player.barrier + 1);
  else if (type === "barrier2") player.barrier = Math.min(MAX_BARRIER, player.barrier + 2);
  else if (type === "barrier8") player.barrier = MAX_BARRIER;
  player.barrierFlash = 24;
}

function triggerWildfire() {
  wildfire = { timer: WILDFIRE_DURATION, frame: 0 };

  for (const g of groundTargets) {
    if (!g.alive) continue;
    const sy = worldToScreen(g.worldY);
    if (sy < -g.h || sy > H) continue;
    g.alive = false;
    score += g.score;
    addBurst(g.x + g.w / 2, sy + g.h / 2, 16, ["#f80", "#ff0", "#f60", "#fff"]);
  }

  enemyBullets = enemyBullets.filter(b => {
    if (b.kind !== "ground") return true;
    const sy = b.y + b.h / 2;
    if (sy < H * 0.3) return true;
    addBurst(b.x + b.w / 2, sy, 5, ["#f80", "#ff0", "#fa0"]);
    return false;
  });

  for (let x = 0; x < W; x += 32) {
    addBurst(x + Math.random() * 16, H * 0.55 + Math.random() * (H * 0.4), 6, ["#f80", "#ff0", "#f60"]);
  }
  addBurst(W / 2, H * 0.72, 36, ["#f80", "#ff0", "#fa0", "#fff", "#f60"]);
}

function updateWildfire() {
  if (!wildfire) return;
  wildfire.frame++;
  wildfire.timer--;
  if (wildfire.timer <= 0) {
    wildfire = null;
    return;
  }
  if (wildfire.frame % 5 === 0) {
    for (let i = 0; i < 4; i++) {
      addBurst(
        Math.random() * W,
        H * 0.42 + Math.random() * (H * 0.55),
        2,
        ["#f80", "#ff0", "#f60", "#fff"]
      );
    }
  }
  if (wildfire.frame % 18 === 0) {
    for (const g of groundTargets) {
      if (!g.alive) continue;
      const sy = worldToScreen(g.worldY);
      if (sy < H * 0.38 || sy > H + g.h) continue;
      g.hp -= 2;
      if (g.hp <= 0) {
        g.alive = false;
        score += g.score;
        addBurst(g.x + g.w / 2, sy + g.h / 2, 10, ["#f80", "#ff0", "#f60"]);
      }
    }
  }
}

function collectPowerUp(item) {
  if (item.type === "radBeam") {
    player.airWeapon = "radBeam";
    player.airWeaponTimer = WEAPON_DURATION;
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 10, ["#ff0", "#0f0", "#fa0", "#fff"]);
  } else if (item.type === "flame") {
    player.groundWeapon = "flame";
    player.groundWeaponTimer = WEAPON_DURATION;
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 10, ["#ff0", "#0f0", "#fa0", "#fff"]);
  } else if (isFunnelMissileItem(item.type)) {
    applyFunnelMissileItem(getFunnelMissileLevelFromItem(item.type));
    const lv = getFunnelMissileLevelFromItem(item.type);
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 12 + lv * 2, ["#f8a", "#fa0", "#fff", "#f66", FUNNEL_ITEM_COLORS[lv - 1]]);
  } else if (item.type === "invincibleStar") {
    player.invincibleTimer = INVINCIBLE_DURATION;
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 16, ["#ff0", "#fff", "#f8f", "#0ff", "#fa0"]);
  } else if (item.type === "wildfire") {
    triggerWildfire();
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 20, ["#f80", "#ff0", "#f60", "#fff", "#fa0"]);
  } else {
    applyBarrierItem(item.type);
    addBurst(item.x + item.w / 2, item.y + item.h / 2, 12, ["#8cf", "#adf", "#fff", "#59d7ff"]);
  }
}

function tryDropPowerUp(x, y) {
  if (Math.random() < POWERUP_DROP_RATE) spawnPowerUp(x, y);
}

function fireZapper() {
  if (shootCooldown > 0) return;
  const cx = player.x + player.w / 2;
  if (player.airWeapon === "radBeam") {
    zappers.push({
      x: cx - 6, y: player.y, w: 12, h: 26, speed: 11, type: "rad", pierce: true, damage: 2
    });
    zappers.push({
      x: cx - 20, y: player.y + 6, w: 7, h: 18, speed: 10, type: "rad", pierce: true, damage: 1
    });
    zappers.push({
      x: cx + 13, y: player.y + 6, w: 7, h: 18, speed: 10, type: "rad", pierce: true, damage: 1
    });
    shootCooldown = 4;
  } else {
    zappers.push({
      x: cx - 2,
      y: player.y,
      w: 4,
      h: 12,
      speed: 9,
      type: "normal",
      pierce: false,
      damage: 1
    });
    shootCooldown = 5;
  }
}

function fireBlaster() {
  if (bombCooldown > 0) return;
  const cx = player.x + player.w / 2;
  if (player.groundWeapon === "flame") {
    for (let n = -1; n <= 1; n++) {
      flames.push({
        x: cx - 6 + n * 8,
        y: player.y + player.h - 4,
        w: 12,
        h: 16,
        vx: n * 1.8 + (Math.random() - 0.5) * 0.8,
        vy: 7 + Math.random() * 2,
        life: 28,
        damage: 2,
        hitIds: new Set()
      });
    }
    bombCooldown = 3;
  } else {
    blasters.push({
      x: cx - 3,
      y: player.y + player.h,
      w: 6,
      h: 6,
      vx: 2,
      vy: 5,
      speed: 6
    });
    bombCooldown = 12;
  }
}

function resetPlayerWeapons() {
  player.airWeapon = "normal";
  player.groundWeapon = "normal";
  player.airWeaponTimer = 0;
  player.groundWeaponTimer = 0;
  player.missileWeaponTimer = 0;
  player.missileLaunchTimer = 0;
  player.missileLevel = 0;
}

function applyFunnelMissileItem(level) {
  player.missileLevel = Math.max(player.missileLevel || 0, level);
  player.missileWeaponTimer = WEAPON_DURATION;
  player.missileLaunchTimer = 0;
  launchFunnelMissiles();
}

function findHomingTarget(fromX, fromY) {
  let best = null;
  let bestDist = Infinity;
  for (const e of airEnemies) {
    if (!e.alive) continue;
    const cx = e.x + e.w / 2;
    const cy = e.y + e.h / 2;
    const d = Math.hypot(cx - fromX, cy - fromY);
    if (d < bestDist) {
      bestDist = d;
      best = { type: "air", ref: e };
    }
  }
  for (const g of groundTargets) {
    if (!g.alive) continue;
    const sy = worldToScreen(g.worldY);
    if (sy < -40 || sy > H + 40) continue;
    const cx = g.x + g.w / 2;
    const cy = sy + g.h / 2;
    const d = Math.hypot(cx - fromX, cy - fromY);
    if (d < bestDist) {
      bestDist = d;
      best = { type: "ground", ref: g };
    }
  }
  return best;
}

function getHomingTargetPos(m) {
  if (!m.targetRef || !m.targetRef.alive) return null;
  if (m.targetType === "air") {
    return { x: m.targetRef.x + m.targetRef.w / 2, y: m.targetRef.y + m.targetRef.h / 2 };
  }
  const sy = worldToScreen(m.targetRef.worldY);
  return { x: m.targetRef.x + m.targetRef.w / 2, y: sy + m.targetRef.h / 2 };
}

function launchFunnelMissile(launchX, launchY, level) {
  const spec = FUNNEL_LEVELS[level];
  const target = findHomingTarget(launchX, launchY);
  missiles.push({
    x: launchX - 4,
    y: launchY,
    w: 8,
    h: 14,
    vx: 0,
    vy: spec.vy,
    speed: spec.speed,
    turnRate: spec.turnRate,
    targetType: target ? target.type : null,
    targetRef: target ? target.ref : null,
    damage: spec.damage,
    level,
    life: 220
  });
}

function launchFunnelMissiles() {
  const level = player.missileLevel || 1;
  const spec = FUNNEL_LEVELS[level];
  const cy = player.y + 8;
  for (let i = 0; i < spec.count; i++) {
    const t = spec.count === 1 ? 0.5 : i / (spec.count - 1);
    const launchX = player.x + 4 + t * (player.w - 8);
    launchFunnelMissile(launchX, cy, level);
  }
}

function destroyEnemyFromMissile(e, x, y) {
  e.alive = false;
  score += e.score;
  addBurst(x, y, 12, ["#ff0", "#fa0", "#f8a", "#fff"]);
  tryDropPowerUp(x, y);
}

function destroyGroundFromMissile(g, sy) {
  g.alive = false;
  score += g.score;
  addBurst(g.x + g.w / 2, sy + g.h / 2, 14, ["#f80", "#ff0", "#f8a", "#fff"]);
  tryDropPowerUp(g.x + g.w / 2, sy + g.h / 2);
}

function takePlayerHit() {
  if (player.invincibleTimer > 0) return;
  if (player.barrier > 0) {
    player.barrier--;
    player.barrierFlash = 20;
    addBurst(
      player.x + player.w / 2,
      player.y + player.h / 2,
      16,
      ["#8cf", "#adf", "#fff", "#59d7ff"]
    );
    return;
  }
  lives--;
  startPlayerExplosion();
}

function startPlayerExplosion() {
  resetPlayerWeapons();
  player.barrier = 0;
  player.barrierFlash = 0;
  player.invincibleTimer = 0;
  legendFadeTimer = 0;
  missiles = [];
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  const particles = [];
  for (let i = 0; i < 28; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 2 + Math.random() * 4,
      life: 20 + Math.floor(Math.random() * 18),
      color: ["#ff0", "#fa0", "#f60", "#0ff"][Math.floor(Math.random() * 4)]
    });
  }
  explosion = { cx, cy, frame: 0, duration: 45, particles };
}


function addBurst(x, y, n, colors) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 2 + Math.random() * 3,
      life: 14 + Math.floor(Math.random() * 10),
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

let burstParticles = [];

function updateExplosion() {
  if (explosion) {
    explosion.frame++;
    for (const p of explosion.particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.life--;
    }
    explosion.particles = explosion.particles.filter(p => p.life > 0);
    if (explosion.frame >= explosion.duration) {
      explosion = null;
      if (lives <= 0) {
        gameOver = true;
      } else {
        player.x = W / 2 - player.w / 2;
        player.y = H - 70;
        player.bank = 0;
        player.afterburner = 0;
        player.afterburnerFrame = 0;
        resetLegendFade();
      }
    }
  }

  updateLegendFade();
  updateBurstParticles();
}

function updateBurstParticles() {
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) burstParticles.splice(i, 1);
  }
}

function updatePlayerBank() {
  const maxBank = 0.38;
  let target = 0;
  if (keys.ArrowLeft) target = -maxBank;
  else if (keys.ArrowRight) target = maxBank;
  player.bank += (target - player.bank) * 0.14;
}

function updatePlayerAfterburner() {
  const target = keys.ArrowUp ? 1 : 0;
  player.afterburner += (target - player.afterburner) * 0.18;
  if (player.afterburner > 0.04) player.afterburnerFrame++;
  else player.afterburnerFrame = 0;
}

function update() {
  if (explosion) {
    updateExplosion();
    return;
  }
  if (gameOver) return;
  updateBurstParticles();
  updateLegendFade();

  scrollY += SCROLL_SPEED + wave * 0.05;

  if (keys.ArrowLeft) player.x = Math.max(8, player.x - player.speed);
  if (keys.ArrowRight) player.x = Math.min(W - player.w - 8, player.x + player.speed);
  if (keys.ArrowUp) player.y = Math.max(H * 0.35, player.y - player.speed);
  if (keys.ArrowDown) player.y = Math.min(H - player.h - 8, player.y + player.speed);
  updatePlayerBank();
  updatePlayerAfterburner();

  if (shootCooldown > 0) shootCooldown--;
  if (bombCooldown > 0) bombCooldown--;
  if (player.airWeaponTimer > 0) {
    player.airWeaponTimer--;
    if (player.airWeaponTimer <= 0) player.airWeapon = "normal";
  }
  if (player.groundWeaponTimer > 0) {
    player.groundWeaponTimer--;
    if (player.groundWeaponTimer <= 0) player.groundWeapon = "normal";
  }
  if (player.missileWeaponTimer > 0) {
    player.missileWeaponTimer--;
    player.missileLaunchTimer++;
    const funnelSpec = FUNNEL_LEVELS[player.missileLevel] || FUNNEL_LEVELS[1];
    if (player.missileLaunchTimer >= funnelSpec.interval) {
      player.missileLaunchTimer = 0;
      launchFunnelMissiles();
    }
  } else {
    player.missileLevel = 0;
  }
  if (player.barrierFlash > 0) player.barrierFlash--;
  if (player.invincibleTimer > 0) {
    player.invincibleTimer--;
  }
  updateWildfire();
  if (keys.Space) fireZapper();
  if (keys.KeyX) fireBlaster();

  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.y += SCROLL_SPEED * 0.55;
    item.timer++;
    item.life--;
    if (item.life <= 0 || item.y > H + 24) {
      items.splice(i, 1);
      continue;
    }
    if (rectsOverlap(item.x, item.y, item.w, item.h, player.x, player.y, player.w, player.h)) {
      collectPowerUp(item);
      items.splice(i, 1);
    }
  }

  spawnTimer++;
  const spawnRate = Math.max(25, 55 - wave * 3);
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0;
    spawnAirEnemy();
    if (wave >= 2 && Math.random() < 0.4) spawnAirEnemy();
  }

  groundSpawnTimer++;
  if (groundSpawnTimer >= 58) {
    groundSpawnTimer = 0;
    const spawnChance = wildfire ? 0.35 : 0.88;
    if (Math.random() < spawnChance) {
      spawnGroundTarget(-scrollY - 90 - Math.random() * 80);
    }
  }

  for (let i = zappers.length - 1; i >= 0; i--) {
    const b = zappers[i];
    b.y -= b.speed;
    if (b.y + b.h < 0) { zappers.splice(i, 1); continue; }

    let hit = false;
    for (const e of airEnemies) {
      if (!e.alive) continue;
      const sy = e.y;
      if (rectsOverlap(b.x, b.y, b.w, b.h, e.x, sy, e.w, e.h)) {
        e.hp -= b.damage || 1;
        hit = true;
        if (e.hp <= 0) {
          e.alive = false;
          score += e.score;
          addBurst(e.x + e.w / 2, e.y + e.h / 2, 12, ["#ff0", "#fa0", "#fff", "#8f8"]);
          tryDropPowerUp(e.x + e.w / 2, e.y + e.h / 2);
        }
        if (!b.pierce) break;
      }
    }
    if (hit && !b.pierce) zappers.splice(i, 1);
  }

  for (let i = blasters.length - 1; i >= 0; i--) {
    const b = blasters[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.y > H || b.x < 0 || b.x > W) { blasters.splice(i, 1); continue; }

    for (const g of groundTargets) {
      if (!g.alive) continue;
      const sy = worldToScreen(g.worldY);
      if (sy < -g.h || sy > H) continue;
      if (rectsOverlap(b.x, b.y, b.w, b.h, g.x, sy, g.w, g.h)) {
        g.hp--;
        blasters.splice(i, 1);
        if (g.hp <= 0) {
          g.alive = false;
          score += g.score;
          addBurst(g.x + g.w / 2, sy + g.h / 2, 14, ["#f80", "#ff0", "#fff"]);
          tryDropPowerUp(g.x + g.w / 2, sy + g.h / 2);
        }
        break;
      }
    }

    for (const e of airEnemies) {
      if (!e.alive) continue;
      if (rectsOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
        e.hp--;
        blasters.splice(i, 1);
        if (e.hp <= 0) {
          e.alive = false;
          score += e.score;
          addBurst(e.x + e.w / 2, e.y + e.h / 2, 10, ["#ff0", "#fa0"]);
          tryDropPowerUp(e.x + e.w / 2, e.y + e.h / 2);
        }
        break;
      }
    }
  }

  for (let i = flames.length - 1; i >= 0; i--) {
    const f = flames[i];
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.08;
    f.life--;
    if (f.life <= 0 || f.y > H + 20 || f.x < -20 || f.x > W + 20) {
      flames.splice(i, 1);
      continue;
    }

    for (const g of groundTargets) {
      if (!g.alive) continue;
      const sy = worldToScreen(g.worldY);
      if (sy < -g.h || sy > H) continue;
      const gid = "g" + g.worldY + ":" + g.x;
      if (f.hitIds.has(gid)) continue;
      if (rectsOverlap(f.x, f.y, f.w, f.h, g.x, sy, g.w, g.h)) {
        f.hitIds.add(gid);
        g.hp -= f.damage;
        if (g.hp <= 0) {
          g.alive = false;
          score += g.score;
          addBurst(g.x + g.w / 2, sy + g.h / 2, 16, ["#f80", "#ff0", "#fff", "#f60"]);
          tryDropPowerUp(g.x + g.w / 2, sy + g.h / 2);
        }
      }
    }

    for (const e of airEnemies) {
      if (!e.alive) continue;
      const eid = "e" + e.x + ":" + e.y;
      if (f.hitIds.has(eid)) continue;
      if (rectsOverlap(f.x, f.y, f.w, f.h, e.x, e.y, e.w, e.h)) {
        f.hitIds.add(eid);
        e.hp -= f.damage;
        if (e.hp <= 0) {
          e.alive = false;
          score += e.score;
          addBurst(e.x + e.w / 2, e.y + e.h / 2, 12, ["#ff0", "#fa0", "#f60"]);
          tryDropPowerUp(e.x + e.w / 2, e.y + e.h / 2);
        }
      }
    }
  }

  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    let pos = getHomingTargetPos(m);
    if (!pos) {
      const next = findHomingTarget(m.x + m.w / 2, m.y + m.h / 2);
      if (next) {
        m.targetType = next.type;
        m.targetRef = next.ref;
        pos = getHomingTargetPos(m);
      }
    }

    const mx = m.x + m.w / 2;
    const my = m.y + m.h / 2;
    const aimX = pos ? pos.x : mx;
    const aimY = pos ? pos.y : my - 80;
    const desired = Math.atan2(aimY - my, aimX - mx);
    let current = Math.atan2(m.vy, m.vx);
    if (Math.hypot(m.vx, m.vy) < 0.2) current = -Math.PI / 2;
    let delta = desired - current;
    while (delta > Math.PI) delta -= Math.PI * 2;
    while (delta < -Math.PI) delta += Math.PI * 2;
    const turned = current + Math.max(-m.turnRate, Math.min(m.turnRate, delta));
    m.vx = Math.cos(turned) * m.speed;
    m.vy = Math.sin(turned) * m.speed;
    m.x += m.vx;
    m.y += m.vy;
    m.life--;
    if (m.life <= 0 || m.x < -24 || m.x > W + 24 || m.y < -40 || m.y > H + 40) {
      missiles.splice(i, 1);
      continue;
    }

    let hit = false;
    for (const e of airEnemies) {
      if (!e.alive) continue;
      if (rectsOverlap(m.x, m.y, m.w, m.h, e.x, e.y, e.w, e.h)) {
        e.hp -= m.damage;
        hit = true;
        if (e.hp <= 0) destroyEnemyFromMissile(e, e.x + e.w / 2, e.y + e.h / 2);
        break;
      }
    }
    if (hit) {
      missiles.splice(i, 1);
      continue;
    }

    for (const g of groundTargets) {
      if (!g.alive) continue;
      const sy = worldToScreen(g.worldY);
      if (sy < -g.h || sy > H) continue;
      if (rectsOverlap(m.x, m.y, m.w, m.h, g.x, sy, g.w, g.h)) {
        g.hp -= m.damage;
        if (g.hp <= 0) destroyGroundFromMissile(g, sy);
        missiles.splice(i, 1);
        break;
      }
    }
  }

  for (const e of airEnemies) {
    if (!e.alive) continue;
    e.y += e.speedY;
    if (e.pattern === "sine") {
      e.x = e.baseX + Math.sin(e.y * 0.04 + e.phase) * 60;
    } else if (e.pattern === "dive") {
      e.x += Math.sin(e.phase + e.y * 0.02) * 2.5;
    }
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y > 20 && e.y < H - 60) {
      enemyBullets.push({
        kind: "air",
        x: e.x + e.w / 2 - 2,
        y: e.y + e.h,
        w: 4,
        h: 8,
        speed: 3.5 + wave * 0.2
      });
      e.shootTimer = 80 + Math.floor(Math.random() * 60);
    }
  }
  airEnemies = airEnemies.filter(e => e.alive && e.y < H + 40);

  for (const g of groundTargets) {
    if (!g.alive || !g.fireCooldown) continue;
    const sy = worldToScreen(g.worldY);
    if (sy < 20 || sy > H - 20) continue;
    g.fireCooldown--;
    if (g.fireCooldown <= 0) {
      const cx = g.x + g.w / 2;
      const cy = sy + g.h * 0.35;
      const dx = player.x + player.w / 2 - cx;
      const dy = player.y + player.h / 2 - cy;
      const len = Math.hypot(dx, dy) || 1;
      const speed = g.type === "giantFortress" ? 1.15 : 1.35;
      enemyBullets.push({
        kind: "ground",
        x: cx - 6,
        y: cy - 10,
        w: 12,
        h: 20,
        vx: dx / len * speed,
        vy: dy / len * speed
      });
      g.fireCooldown = (g.type === "giantFortress" ? 70 : 95) - Math.min(wave * 4, 28);
    }
  }

  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx || 0;
    b.y += b.vy === undefined ? b.speed : b.vy;
    if (b.y > H || b.y + b.h < 0 || b.x > W || b.x + b.w < 0) { enemyBullets.splice(i, 1); continue; }
    if (rectsOverlap(b.x, b.y, b.w, b.h, player.x, player.y, player.w, player.h)) {
      enemyBullets.splice(i, 1);
      takePlayerHit();
    }
  }

  if (score >= wave * 2000) wave++;

  groundTargets = groundTargets.filter(g => {
    if (!g.alive) return false;
    const sy = worldToScreen(g.worldY);
    return sy < H + 60;
  });
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

const NAZCA_SITES = [
  { kind: "condor", worldY: -220, x: 310, scale: 1.55, rot: 0.04 },
  { kind: "spider", worldY: 480, x: 400, scale: 1.45, rot: -0.06 },
  { kind: "monkey", worldY: 1140, x: 150, scale: 1.38, rot: 0.1 },
  { kind: "spiral", worldY: 1780, x: 330, scale: 1.62, rot: 0 },
  { kind: "trapezoid", worldY: 2420, x: 290, scale: 1.32, rot: -0.05 },
  { kind: "condor", worldY: 3060, x: 220, scale: 1.48, rot: -0.08 }
];
const NAZCA_CYCLE = 3600;

function nazcaPath(kind) {
  const p = new Path2D();
  if (kind === "condor") {
    p.moveTo(102, 6);
    p.lineTo(138, 4);
    p.lineTo(46, 10);
    p.quadraticCurveTo(14, 14, 2, 30);
    p.quadraticCurveTo(-14, 52, -32, 38);
    p.lineTo(-78, -4);
    p.lineTo(-62, -58);
    p.lineTo(-18, -38);
    p.lineTo(28, -24);
    p.quadraticCurveTo(62, -14, 78, 6);
    p.lineTo(92, 28);
    p.lineTo(72, 48);
    p.lineTo(38, 36);
    p.lineTo(16, 20);
    p.closePath();
    p.moveTo(2, 30);
    p.lineTo(22, 54);
    p.lineTo(44, 40);
    p.lineTo(16, 20);
  } else if (kind === "spider") {
    p.ellipse(0, 12, 22, 32, 0, 0, Math.PI * 2);
    p.moveTo(0, -28);
    p.arc(0, -28, 14, 0, Math.PI * 2);
    p.moveTo(-8, -8);
    p.lineTo(-58, -48);
    p.moveTo(8, -8);
    p.lineTo(62, -38);
    p.moveTo(-14, 4);
    p.lineTo(-72, 8);
    p.moveTo(14, 4);
    p.lineTo(78, 18);
    p.moveTo(-12, 22);
    p.lineTo(-68, 58);
    p.moveTo(12, 22);
    p.lineTo(70, 62);
    p.moveTo(0, 36);
    p.lineTo(0, 88);
    p.moveTo(-6, 40);
    p.lineTo(-24, 82);
    p.moveTo(6, 40);
    p.lineTo(26, 84);
  } else if (kind === "monkey") {
    p.moveTo(-18, -52);
    p.lineTo(-18, -18);
    p.lineTo(-42, 8);
    p.moveTo(-18, -18);
    p.lineTo(8, -48);
    p.moveTo(-18, -18);
    p.lineTo(-8, 18);
    p.lineTo(-28, 52);
    p.moveTo(-8, 18);
    p.lineTo(18, 48);
    p.moveTo(-8, 18);
    p.quadraticCurveTo(32, 28, 58, 8);
    p.quadraticCurveTo(82, -18, 72, -48);
    p.quadraticCurveTo(58, -72, 28, -62);
    p.quadraticCurveTo(2, -48, -8, -18);
  } else if (kind === "trapezoid") {
    p.moveTo(-48, 42);
    p.lineTo(-28, -38);
    p.lineTo(28, -38);
    p.lineTo(48, 42);
    p.closePath();
    p.moveTo(-20, 18);
    p.lineTo(0, -18);
    p.lineTo(20, 18);
    p.moveTo(-32, 0);
    p.lineTo(32, 0);
    p.moveTo(0, -38);
    p.lineTo(0, 42);
  } else {
    for (let a = 0; a <= Math.PI * 5.2; a += 0.08) {
      const r = 6 + a * 9.5;
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r;
      if (a === 0) p.moveTo(px, py);
      else p.lineTo(px, py);
    }
  }
  return p;
}

function drawSacredNazca(cx, cy, kind, scale, rotation) {
  const path = nazcaPath(kind);
  const reach = kind === "spiral" ? 240 : kind === "condor" ? 220 : 195;
  const aura = reach * scale;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  ctx.scale(scale, scale);

  const halo = ctx.createRadialGradient(0, 0, aura * 0.1, 0, 0, aura * 1.15);
  halo.addColorStop(0, "rgba(255, 242, 205, 0.32)");
  halo.addColorStop(0.35, "rgba(245, 215, 155, 0.16)");
  halo.addColorStop(0.7, "rgba(220, 180, 120, 0.06)");
  halo.addColorStop(1, "rgba(200, 160, 100, 0)");
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.ellipse(0, 0, aura * 1.05, aura * 0.82, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "rgba(210, 178, 124, 0.2)";
  ctx.beginPath();
  ctx.ellipse(0, 0, aura * 0.72, aura * 0.56, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "rgba(255, 230, 180, 0.14)";
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 14]);
  ctx.beginPath();
  ctx.ellipse(0, 0, aura * 0.88, aura * 0.68, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  ctx.strokeStyle = "rgba(28, 18, 8, 0.7)";
  ctx.lineWidth = 20;
  ctx.stroke(path);

  ctx.strokeStyle = "rgba(148, 112, 68, 0.95)";
  ctx.lineWidth = 13;
  ctx.stroke(path);

  ctx.strokeStyle = "rgba(228, 204, 152, 0.96)";
  ctx.lineWidth = 7;
  ctx.stroke(path);

  ctx.strokeStyle = "rgba(255, 250, 230, 0.55)";
  ctx.lineWidth = 2.2;
  ctx.stroke(path);

  ctx.restore();
}

function drawNazcaField() {
  for (const site of NAZCA_SITES) {
    for (let rep = -1; rep <= 2; rep++) {
      const sy = worldToScreen(site.worldY + rep * NAZCA_CYCLE);
      if (sy < -280 || sy > H + 280) continue;
      drawSacredNazca(site.x, sy, site.kind, site.scale, site.rot);
    }
  }
}

function drawBackground() {
  const burning = wildfire && wildfire.timer > 0;
  const burnRatio = burning ? wildfire.timer / WILDFIRE_DURATION : 0;

  const grass = ctx.createLinearGradient(0, 0, 0, H);
  if (burning) {
    grass.addColorStop(0, "#4a3518");
    grass.addColorStop(0.45, "#5a2818");
    grass.addColorStop(1, "#3a1208");
  } else {
    grass.addColorStop(0, "#4f7d35");
    grass.addColorStop(0.45, "#6a943f");
    grass.addColorStop(1, "#8a7a3c");
  }
  ctx.fillStyle = grass;
  ctx.fillRect(0, 0, W, H);

  const scroll = scrollY * 0.85;

  ctx.fillStyle = "rgba(155, 132, 62, 0.45)";
  for (let i = -1; i < 8; i++) {
    const y = ((i * 92 + scroll) % (H + 150)) - 60;
    const x = 40 + ((i * 113) % (W - 160));
    roundRect(x, y, 120 + (i % 3) * 26, 42, 18);
    ctx.fill();
  }

  ctx.strokeStyle = "rgba(232, 213, 123, 0.28)";
  ctx.lineWidth = 1;
  for (let y = ((scrollY * 1.2) % 44) - 44; y < H; y += 44) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.bezierCurveTo(W * 0.25, y + 10, W * 0.7, y - 8, W, y + 5);
    ctx.stroke();
  }

  drawNazcaField();

  ctx.fillStyle = "#174c22";
  for (let grove = 0; grove < 7; grove++) {
    const baseX = (grove * 97 + 22) % (W - 70);
    const baseY = ((grove * 119 + scrollY) % (H + 130)) - 60;
    for (let tree = 0; tree < 8; tree++) {
      const x = baseX + (tree % 4) * 15 + Math.sin(tree * 2.1) * 4;
      const y = baseY + Math.floor(tree / 4) * 16 + Math.cos(tree * 1.7) * 5;
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = burning ? "#1a0a04" : "#0f3418";
      ctx.beginPath();
      ctx.arc(x + 3, y + 3, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = burning ? "#3a1808" : "#174c22";
    }
  }

  ctx.strokeStyle = "rgba(93, 66, 33, 0.62)";
  ctx.lineWidth = 8;
  ctx.beginPath();
  const roadX = W * 0.68 + Math.sin(scrollY * 0.004) * 40;
  ctx.moveTo(roadX, -20);
  ctx.bezierCurveTo(roadX - 80, H * 0.25, roadX + 90, H * 0.55, roadX - 25, H + 20);
  ctx.stroke();

  ctx.strokeStyle = "rgba(243, 219, 139, 0.22)";
  ctx.lineWidth = 2;
  for (let y = ((scrollY * 1.4) % 56) - 56; y < H; y += 56) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y + 22);
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(190, 230, 190, 0.08)";
  ctx.fillRect(0, 0, W, H);

  if (burning) {
    const smoke = ctx.createLinearGradient(0, H * 0.25, 0, H);
    smoke.addColorStop(0, `rgba(80, 40, 10, ${0.08 * burnRatio})`);
    smoke.addColorStop(0.45, `rgba(160, 50, 10, ${0.18 * burnRatio})`);
    smoke.addColorStop(1, `rgba(60, 15, 0, ${0.28 * burnRatio})`);
    ctx.fillStyle = smoke;
    ctx.fillRect(0, H * 0.25, W, H * 0.75);
  }
}

function drawWildfireOverlay() {
  if (!wildfire || wildfire.timer <= 0) return;
  const ratio = wildfire.timer / WILDFIRE_DURATION;
  const frame = wildfire.frame;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";

  for (let x = 0; x < W; x += 18) {
    const baseY = H - 8 + Math.sin(frame * 0.12 + x * 0.07) * 4;
    const flameH = 22 + Math.sin(frame * 0.18 + x * 0.11) * 14 + ((x * 17) % 11);
    const alpha = (0.35 + Math.sin(frame * 0.2 + x) * 0.12) * ratio;
    const grad = ctx.createLinearGradient(x, baseY, x, baseY - flameH);
    grad.addColorStop(0, `rgba(255, 220, 80, ${alpha})`);
    grad.addColorStop(0.35, `rgba(255, 100, 20, ${alpha * 0.85})`);
    grad.addColorStop(1, "rgba(255, 40, 0, 0)");
    ctx.fillStyle = grad;
    ctx.fillRect(x, baseY - flameH, 14, flameH);
  }

  for (let band = 0; band < 3; band++) {
    const y = H * (0.45 + band * 0.16) + Math.sin(frame * 0.08 + band) * 6;
    ctx.fillStyle = `rgba(255, 90, 10, ${(0.06 + band * 0.03) * ratio})`;
    ctx.fillRect(0, y, W, 28 + band * 8);
  }

  ctx.restore();
}

function drawAfterburner(sx, sy, intensity, frame) {
  const flicker = 0.78 + Math.sin(frame * 0.55) * 0.14 + Math.sin(frame * 1.35) * 0.08;
  const len = (11 + Math.sin(frame * 0.85) * 3.5) * sy * intensity * flicker;
  const halfW = (2.6 + Math.sin(frame * 0.65) * 0.55) * sx * intensity;
  const nozzleY = 13.2 * sy;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";

  const grad = ctx.createRadialGradient(0, nozzleY, 0, 0, nozzleY + len * 0.45, len * 0.95);
  grad.addColorStop(0, `rgba(255, 255, 230, ${0.95 * intensity})`);
  grad.addColorStop(0.22, `rgba(255, 195, 50, ${0.88 * intensity})`);
  grad.addColorStop(0.55, `rgba(255, 90, 25, ${0.55 * intensity})`);
  grad.addColorStop(1, "rgba(255, 50, 0, 0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-halfW, nozzleY);
  ctx.quadraticCurveTo(-halfW * 1.7, nozzleY + len * 0.5, 0, nozzleY + len);
  ctx.quadraticCurveTo(halfW * 1.7, nozzleY + len * 0.5, halfW, nozzleY);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = `rgba(255, 248, 210, ${0.92 * intensity})`;
  ctx.beginPath();
  ctx.ellipse(0, nozzleY + 0.5 * sy, halfW * 0.5, 2 * sy, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = `rgba(255, 120, 30, ${0.35 * intensity})`;
  for (let i = 0; i < 4; i++) {
    const px = Math.sin(frame * 0.4 + i * 2.1) * halfW * 0.9;
    const py = nozzleY + len * (0.35 + i * 0.14) + Math.sin(frame + i) * sy;
    ctx.beginPath();
    ctx.arc(px, py, (1.2 + (i % 2) * 0.6) * sx, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawPlayer(x, y, w, h, bank = 0, afterburner = 0, afterburnerFrame = 0) {
  const cx = x + w / 2;
  const cy = y + h / 2;
  const sx = w / 32;
  const sy = h / 36;

  ctx.save();

  ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
  ctx.beginPath();
  ctx.ellipse(cx, cy + h * 0.34, w * 0.42, h * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.translate(cx, cy);
  ctx.rotate(bank);

  if (afterburner > 0.04) drawAfterburner(sx, sy, afterburner, afterburnerFrame);

  ctx.fillStyle = "#4f5868";
  ctx.beginPath();
  ctx.moveTo(-4 * sx, -2 * sy);
  ctx.lineTo(-15 * sx, 8 * sy);
  ctx.lineTo(-4 * sx, 6 * sy);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(4 * sx, -2 * sy);
  ctx.lineTo(15 * sx, 8 * sy);
  ctx.lineTo(4 * sx, 6 * sy);
  ctx.closePath();
  ctx.fill();

  const fuselage = ctx.createLinearGradient(-8 * sx, 0, 8 * sx, 0);
  fuselage.addColorStop(0, "#5c6678");
  fuselage.addColorStop(0.45, "#b8c2d4");
  fuselage.addColorStop(1, "#5c6678");
  ctx.fillStyle = fuselage;
  ctx.beginPath();
  ctx.moveTo(0, -16 * sy);
  ctx.lineTo(3.5 * sx, -6 * sy);
  ctx.lineTo(3 * sx, 10 * sy);
  ctx.lineTo(5 * sx, 14 * sy);
  ctx.lineTo(0, 12 * sy);
  ctx.lineTo(-5 * sx, 14 * sy);
  ctx.lineTo(-3 * sx, 10 * sy);
  ctx.lineTo(-3.5 * sx, -6 * sy);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#3f4654";
  ctx.beginPath();
  ctx.moveTo(-7 * sx, 8 * sy);
  ctx.lineTo(-10 * sx, 14 * sy);
  ctx.lineTo(-3 * sx, 10 * sy);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(7 * sx, 8 * sy);
  ctx.lineTo(10 * sx, 14 * sy);
  ctx.lineTo(3 * sx, 10 * sy);
  ctx.fill();

  ctx.fillStyle = "#353b47";
  ctx.fillRect(-1.5 * sx, 9 * sy, 3 * sx, 5 * sy);

  ctx.fillStyle = "#4678a8";
  ctx.beginPath();
  ctx.ellipse(0, -3 * sy, 3.2 * sx, 4.5 * sy, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "rgba(190, 230, 255, 0.55)";
  ctx.beginPath();
  ctx.ellipse(-0.8 * sx, -4 * sy, 1.4 * sx, 2 * sy, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#2e343f";
  ctx.beginPath();
  ctx.moveTo(0, -16 * sy);
  ctx.lineTo(2 * sx, -11 * sy);
  ctx.lineTo(-2 * sx, -11 * sy);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = "rgba(230, 238, 248, 0.55)";
  ctx.lineWidth = Math.max(0.8, sx);
  ctx.beginPath();
  ctx.moveTo(-4 * sx, -2 * sy);
  ctx.lineTo(-15 * sx, 8 * sy);
  ctx.moveTo(4 * sx, -2 * sy);
  ctx.lineTo(15 * sx, 8 * sy);
  ctx.stroke();

  ctx.fillStyle = "#252930";
  ctx.fillRect(-1.2 * sx, 12 * sy, 2.4 * sx, 2 * sy);

  ctx.restore();
}

function drawAirEnemy(e) {
  const cx = e.x + e.w / 2;
  const cy = e.y + e.h / 2;

  ctx.save();
  ctx.fillStyle = "rgba(0, 0, 0, 0.24)";
  ctx.beginPath();
  ctx.ellipse(cx + 14, e.y + e.h + 24, e.w * 0.7, e.h * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = e.kind === "large" ? "#ffd66b" : "#8affff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, Math.max(e.w, e.h) * 0.75, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = e.kind === "large" ? "#ff355d" : "#35f4ff";
  if (e.kind === "large") {
    ctx.beginPath();
    ctx.moveTo(cx, e.y + e.h + 3);
    ctx.lineTo(e.x + e.w, e.y + 7);
    ctx.lineTo(e.x + e.w * 0.62, e.y + 2);
    ctx.lineTo(cx, e.y - 4);
    ctx.lineTo(e.x + e.w * 0.38, e.y + 2);
    ctx.lineTo(e.x, e.y + 7);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#fff1a8";
    ctx.fillRect(cx - 3, e.y + 6, 6, e.h * 0.6);
  } else {
    ctx.beginPath();
    ctx.moveTo(cx, e.y + e.h + 2);
    ctx.lineTo(e.x + e.w, e.y + 5);
    ctx.lineTo(cx, e.y - 3);
    ctx.lineTo(e.x, e.y + 5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#eaffff";
    ctx.fillRect(cx - 2, e.y + 5, 4, e.h * 0.55);
  }

  ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
  ctx.font = "9px monospace";
  ctx.textAlign = "center";
  ctx.fillText("AIR", cx, e.y - 9);
  ctx.textAlign = "left";
  ctx.restore();
}

function drawGroundTarget(g, sy) {
  if (sy < -g.h || sy > H) return;
  const cx = g.x + g.w / 2;
  const baseY = sy + g.h;

  ctx.save();
  ctx.fillStyle = "rgba(0, 0, 0, 0.46)";
  ctx.beginPath();
  ctx.ellipse(cx + 5, baseY + 5, g.w * 0.72, g.h * 0.34, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "rgba(255, 229, 112, 0.75)";
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.ellipse(cx, baseY - 2, g.w * 0.65, g.h * 0.45, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  if (g.type === "giantFortress") {
    ctx.fillStyle = "#211711";
    roundRect(g.x, sy + g.h * 0.28, g.w, g.h * 0.72, 8);
    ctx.fill();
    ctx.fillStyle = "#5b3d25";
    roundRect(g.x + 8, sy + 8, g.w - 16, g.h * 0.56, 6);
    ctx.fill();
    ctx.fillStyle = "#c89554";
    roundRect(g.x + g.w * 0.34, sy, g.w * 0.32, g.h * 0.46, 5);
    ctx.fill();
    ctx.fillStyle = "#ffe570";
    ctx.fillRect(g.x + 9, sy + g.h * 0.54, g.w - 18, 4);
    ctx.fillRect(g.x + g.w * 0.18, sy + g.h * 0.18, 18, 5);
    ctx.fillRect(g.x + g.w * 0.64, sy + g.h * 0.18, 18, 5);
    ctx.fillStyle = "#100b08";
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(g.x + 16 + i * 15, sy + g.h * 0.62, 8, 8);
    }
  } else if (g.type === "smallFortress") {
    ctx.fillStyle = "#302017";
    roundRect(g.x, sy + g.h * 0.26, g.w, g.h * 0.74, 6);
    ctx.fill();
    ctx.fillStyle = "#8c6236";
    roundRect(g.x + 5, sy + 5, g.w - 10, g.h * 0.55, 5);
    ctx.fill();
    ctx.fillStyle = "#ffe570";
    ctx.fillRect(g.x + 7, sy + g.h * 0.48, g.w - 14, 3);
    ctx.fillStyle = "#1a110c";
    ctx.fillRect(g.x + g.w * 0.18, sy + g.h * 0.62, 8, 7);
    ctx.fillRect(g.x + g.w * 0.62, sy + g.h * 0.62, 8, 7);
  } else if (g.type === "pillbox") {
    ctx.fillStyle = "#4a321f";
    roundRect(g.x, sy + g.h * 0.38, g.w, g.h * 0.62, 5);
    ctx.fill();
    ctx.fillStyle = "#b8874b";
    ctx.beginPath();
    ctx.arc(g.x + g.w / 2, sy + g.h * 0.38, g.w * 0.5, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = "#21150d";
    ctx.fillRect(g.x + g.w * 0.22, sy + g.h * 0.48, g.w * 0.56, g.h * 0.18);
  } else if (g.type === "aaGun") {
    ctx.fillStyle = "#2d2a23";
    roundRect(g.x + g.w * 0.12, sy + g.h * 0.54, g.w * 0.76, g.h * 0.42, 4);
    ctx.fill();
    ctx.fillStyle = "#79856a";
    ctx.beginPath();
    ctx.arc(cx, sy + g.h * 0.55, g.w * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#ffe570";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(cx, sy + g.h * 0.48);
    ctx.lineTo(cx + g.w * 0.32, sy + g.h * 0.1);
    ctx.stroke();
    ctx.fillStyle = "#ffed8a";
    ctx.beginPath();
    ctx.arc(cx + g.w * 0.35, sy + g.h * 0.07, 4, 0, Math.PI * 2);
    ctx.fill();
  } else if (g.type === "tank") {
    ctx.fillStyle = "#25351f";
    roundRect(g.x, sy + g.h * 0.42, g.w, g.h * 0.62, 3);
    ctx.fill();
    ctx.fillStyle = "#79a942";
    roundRect(g.x + g.w * 0.12, sy + g.h * 0.1, g.w * 0.55, g.h * 0.52, 4);
    ctx.fill();
    ctx.fillStyle = "#ffe570";
    ctx.fillRect(g.x + g.w * 0.63, sy + g.h * 0.38, g.w * 0.48, 3);
  }

  ctx.fillStyle = "rgba(255, 229, 112, 0.9)";
  ctx.font = "8px monospace";
  ctx.textAlign = "center";
  ctx.fillText("GROUND", cx, baseY + 18);
  ctx.textAlign = "left";
  ctx.restore();
}

function drawExplosion() {
  if (!explosion) return;
  const t = explosion.frame / explosion.duration;
  ctx.save();
  ctx.globalAlpha = Math.max(0, 1 - t * 1.2);
  ctx.fillStyle = "#ff0";
  ctx.beginPath();
  ctx.arc(explosion.cx, explosion.cy, 6 + t * 30, 0, Math.PI * 2);
  ctx.fill();
  for (const p of explosion.particles) {
    ctx.globalAlpha = Math.max(0, p.life / 25);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.restore();
}

function drawBursts() {
  for (const p of burstParticles) {
    ctx.globalAlpha = Math.max(0, p.life / 20);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawLivesHUD() {
  const iconW = 14;
  const iconH = 10;
  const gap = 5;
  const padding = 10;
  const y = 10;
  const totalW = lives > 0 ? lives * iconW + (lives - 1) * gap : 0;
  const startX = W - padding - totalW;
  ctx.fillStyle = "#8ab4d4";
  ctx.font = "11px monospace";
  ctx.textAlign = "right";
  ctx.fillText("LIVES", W - padding, y - 2);
  ctx.textAlign = "left";
  for (let i = 0; i < lives; i++) {
    drawPlayer(startX + i * (iconW + gap), y, iconW, iconH);
  }
}

function drawAirBullet(b) {
  ctx.fillStyle = "#f88";
  ctx.fillRect(b.x, b.y, b.w, b.h);
}

function drawGroundShell(b) {
  const cx = b.x + b.w / 2;
  const cy = b.y + b.h / 2;
  const angle = Math.atan2(b.vy, b.vx);
  const speed = Math.hypot(b.vx, b.vy) || 1;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  for (let i = 1; i <= 5; i++) {
    const alpha = 0.42 - i * 0.07;
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.fillStyle = i < 3 ? "rgba(255, 170, 60, 0.55)" : "rgba(140, 140, 140, 0.45)";
    ctx.beginPath();
    ctx.ellipse(-i * (5 + speed), 0, 5 + i * 1.2, 3.5 + i * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.shadowColor = "rgba(255, 120, 40, 0.85)";
  ctx.shadowBlur = 12;

  const body = ctx.createLinearGradient(-8, 0, 10, 0);
  body.addColorStop(0, "#8b4513");
  body.addColorStop(0.35, "#d4a017");
  body.addColorStop(0.65, "#f0d060");
  body.addColorStop(1, "#7a4a12");
  ctx.fillStyle = body;
  roundRect(-8, -6, 14, 12, 3);
  ctx.fill();

  ctx.shadowBlur = 0;

  ctx.fillStyle = "#2a2a2a";
  ctx.beginPath();
  ctx.moveTo(6, -5);
  ctx.lineTo(16, 0);
  ctx.lineTo(6, 5);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#c45c26";
  ctx.fillRect(-10, -4, 4, 8);

  ctx.strokeStyle = "rgba(255, 240, 180, 0.7)";
  ctx.lineWidth = 1.2;
  roundRect(-8, -6, 14, 12, 3);
  ctx.stroke();

  ctx.restore();
}

function drawEnemyBullets() {
  for (const b of enemyBullets) {
    if (b.kind === "ground") drawGroundShell(b);
    else drawAirBullet(b);
  }
}

function buildStarPath(outerR, innerR) {
  const path = new Path2D();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const px = Math.cos(a) * r;
    const py = Math.sin(a) * r;
    if (i === 0) path.moveTo(px, py);
    else path.lineTo(px, py);
  }
  path.closePath();
  return path;
}

function drawInvincibleStarGraphic(scale, rotation, pulse) {
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 18 * scale);
  glow.addColorStop(0, `rgba(255, 255, 220, ${0.95 * pulse})`);
  glow.addColorStop(0.45, `rgba(255, 220, 60, ${0.65 * pulse})`);
  glow.addColorStop(1, "rgba(255, 160, 0, 0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, 18 * scale, 0, Math.PI * 2);
  ctx.fill();

  ctx.rotate(rotation);
  const star = buildStarPath(12 * scale, 5 * scale);
  ctx.fillStyle = "#ffe570";
  ctx.fill(star);
  ctx.strokeStyle = "#fff8c0";
  ctx.lineWidth = 1.5;
  ctx.stroke(star);
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(0, 0, 2.5 * scale, 0, Math.PI * 2);
  ctx.fill();
}

function drawInvincibleAura(x, y, w, h, timer) {
  const cx = x + w / 2;
  const cy = y + h / 2;
  const pulse = 0.8 + Math.sin(performance.now() * 0.012) * 0.2;
  const rotation = performance.now() * 0.004;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.globalCompositeOperation = "lighter";

  for (let i = 0; i < 3; i++) {
    ctx.save();
    ctx.rotate(rotation + i * Math.PI * 2 / 3);
    drawInvincibleStarGraphic(0.85 + i * 0.18, 0, pulse * (0.55 - i * 0.12));
    ctx.restore();
  }

  ctx.strokeStyle = `rgba(255, 240, 120, ${0.35 * pulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, Math.max(w, h) * 0.62, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawFunnelMissileItemIcon(level, pulse, timer) {
  const color = FUNNEL_ITEM_COLORS[level - 1];
  const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
  glow.addColorStop(0, `rgba(255, 180, 160, ${0.95 * pulse})`);
  glow.addColorStop(0.45, `rgba(255, 90, 90, ${0.55 * pulse})`);
  glow.addColorStop(1, "rgba(255, 40, 40, 0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, 16, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.rotate(Math.sin(timer * 0.08) * 0.35);
  for (let i = 0; i < level; i++) {
    const offset = (i - (level - 1) / 2) * 5;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(offset, -10);
    ctx.lineTo(offset + 3, 6);
    ctx.lineTo(offset, 3);
    ctx.lineTo(offset - 3, 6);
    ctx.closePath();
    ctx.fill();
  }
  ctx.strokeStyle = "rgba(255, 200, 120, 0.75)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-10, 4);
  ctx.quadraticCurveTo(-14, 0, -10, -4);
  ctx.moveTo(10, 4);
  ctx.quadraticCurveTo(14, 0, 10, -4);
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = level >= 4 ? "#fff8c0" : "#ffd0c0";
  ctx.font = "8px monospace";
  ctx.textAlign = "center";
  ctx.fillText("F" + level, 0, 16);
}

function drawPowerUp(item) {
  const bob = Math.sin(item.timer * 0.1 + item.bob) * 3;
  const cx = item.x + item.w / 2;
  const cy = item.y + item.h / 2 + bob;
  const pulse = 0.75 + Math.sin(item.timer * 0.14) * 0.25;

  ctx.save();
  ctx.translate(cx, cy);

  if (item.type === "radBeam") {
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
    glow.addColorStop(0, `rgba(180, 255, 120, ${0.95 * pulse})`);
    glow.addColorStop(0.45, `rgba(80, 255, 80, ${0.55 * pulse})`);
    glow.addColorStop(1, "rgba(40, 180, 40, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#8f8";
    ctx.lineWidth = 2;
    for (let a = 0; a < 6; a++) {
      const ang = a * Math.PI / 3 + item.timer * 0.05;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ang) * 5, Math.sin(ang) * 5);
      ctx.lineTo(Math.cos(ang) * 13, Math.sin(ang) * 13);
      ctx.stroke();
    }

    ctx.fillStyle = "#efe";
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#4c4";
    ctx.font = "8px monospace";
    ctx.textAlign = "center";
    ctx.fillText("RAD", 0, 3);
  } else if (item.type === "flame") {
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
    glow.addColorStop(0, `rgba(255, 240, 180, ${0.95 * pulse})`);
    glow.addColorStop(0.4, `rgba(255, 120, 30, ${0.65 * pulse})`);
    glow.addColorStop(1, "rgba(255, 40, 0, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#f80";
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.quadraticCurveTo(8, -2, 6, 8);
    ctx.quadraticCurveTo(0, 4, -6, 8);
    ctx.quadraticCurveTo(-8, -2, 0, -10);
    ctx.fill();
    ctx.fillStyle = "#ff0";
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.quadraticCurveTo(4, 0, 0, 5);
    ctx.quadraticCurveTo(-4, 0, 0, -6);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = "8px monospace";
    ctx.textAlign = "center";
    ctx.fillText("FLM", 0, 14);
  } else if (isFunnelMissileItem(item.type)) {
    drawFunnelMissileItemIcon(getFunnelMissileLevelFromItem(item.type), pulse, item.timer);
  } else if (item.type === "invincibleStar") {
    drawInvincibleStarGraphic(1, item.timer * 0.06, pulse);
    ctx.fillStyle = "#fff8c0";
    ctx.font = "8px monospace";
    ctx.textAlign = "center";
    ctx.fillText("STR", 0, 16);
  } else if (item.type === "wildfire") {
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
    glow.addColorStop(0, `rgba(255, 220, 120, ${0.95 * pulse})`);
    glow.addColorStop(0.4, `rgba(255, 80, 10, ${0.7 * pulse})`);
    glow.addColorStop(1, "rgba(120, 20, 0, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#ff0";
    ctx.lineWidth = 2;
    for (let r = 0; r < 8; r++) {
      const ang = r * Math.PI / 4 + item.timer * 0.04;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ang) * 4, Math.sin(ang) * 4);
      ctx.lineTo(Math.cos(ang) * 12, Math.sin(ang) * 12);
      ctx.stroke();
    }

    ctx.fillStyle = "#f80";
    ctx.beginPath();
    ctx.moveTo(0, -8);
    ctx.quadraticCurveTo(7, 0, 5, 9);
    ctx.quadraticCurveTo(0, 5, -5, 9);
    ctx.quadraticCurveTo(-7, 0, 0, -8);
    ctx.fill();
    ctx.fillStyle = "#ff0";
    ctx.font = "8px monospace";
    ctx.textAlign = "center";
    ctx.fillText("WFR", 0, 15);
  } else {
    const isMax = item.type === "barrier8";
    const layers = item.type === "barrier1" ? 1 : item.type === "barrier2" ? 2 : 8;
    const core = isMax ? "#ffe570" : "#59d7ff";
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 16);
    glow.addColorStop(0, isMax ? `rgba(255, 230, 120, ${0.95 * pulse})` : `rgba(120, 220, 255, ${0.9 * pulse})`);
    glow.addColorStop(0.5, isMax ? `rgba(255, 180, 40, ${0.5 * pulse})` : `rgba(60, 160, 255, ${0.45 * pulse})`);
    glow.addColorStop(1, "rgba(40, 120, 255, 0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();

    for (let ring = 0; ring < layers; ring++) {
      const radius = 5 + ring * (isMax ? 1.1 : 2.2);
      ctx.strokeStyle = isMax
        ? `rgba(255, ${210 - ring * 8}, ${80 + ring * 6}, ${0.95 - ring * 0.06})`
        : `rgba(89, 215, 255, ${0.95 - ring * 0.18})`;
      ctx.lineWidth = isMax ? 1.4 : 2;
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = isMax ? "#fff8d0" : "#eaffff";
    ctx.font = "8px monospace";
    ctx.textAlign = "center";
    ctx.fillText("B" + layers, 0, 3);
  }

  ctx.textAlign = "left";
  ctx.restore();
}

function drawMissiles() {
  for (const m of missiles) {
    const cx = m.x + m.w / 2;
    const cy = m.y + m.h / 2;
    const angle = Math.atan2(m.vy, m.vx) + Math.PI / 2;
    const speed = Math.hypot(m.vx, m.vy);
    const level = m.level || 1;
    const bodyColor = FUNNEL_ITEM_COLORS[level - 1];

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    for (let i = 1; i <= 3 + level; i++) {
      ctx.globalAlpha = Math.max(0, 0.38 - i * 0.06);
      ctx.fillStyle = i < 3 ? "rgba(255, 140, 80, 0.65)" : "rgba(180, 180, 180, 0.45)";
      ctx.beginPath();
      ctx.ellipse(0, i * (3.5 + speed * 0.35), 2.5 + level * 0.3 + i * 0.35, 2 + i * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.shadowColor = bodyColor;
    ctx.shadowBlur = 6 + level * 2;
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.moveTo(0, -7 - level * 0.5);
    ctx.lineTo(3 + level * 0.3, 6);
    ctx.lineTo(0, 3.5);
    ctx.lineTo(-3 - level * 0.3, 6);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#fff";
    ctx.fillRect(-1.2, -5, 2.4, 4 + level * 0.4);
    ctx.restore();
  }
}

function drawFlames() {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const f of flames) {
    const alpha = Math.max(0, f.life / 28);
    const cx = f.x + f.w / 2;
    const cy = f.y + f.h / 2;
    const radius = 8 + (28 - f.life) * 0.35;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0, `rgba(255, 255, 220, ${0.95 * alpha})`);
    grad.addColorStop(0.25, `rgba(255, 220, 40, ${0.85 * alpha})`);
    grad.addColorStop(0.55, `rgba(255, 90, 20, ${0.65 * alpha})`);
    grad.addColorStop(1, "rgba(255, 30, 0, 0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawZappers() {
  for (const b of zappers) {
    if (b.type === "rad") {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.shadowColor = "#7f0";
      ctx.shadowBlur = 14;
      ctx.fillStyle = "rgba(80, 255, 80, 0.55)";
      ctx.fillRect(b.x - 2, b.y, b.w + 4, b.h);
      ctx.fillStyle = "#cfc";
      ctx.fillRect(b.x + b.w * 0.2, b.y, b.w * 0.6, b.h);
      ctx.fillStyle = "#efe";
      ctx.fillRect(b.x + b.w * 0.35, b.y + 2, b.w * 0.3, b.h - 4);
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      ctx.fillStyle = "#eaffff";
      ctx.shadowColor = "#35f4ff";
      ctx.shadowBlur = 10;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.fillRect(b.x - 3, b.y + 3, b.w + 6, 2);
      ctx.shadowBlur = 0;
    }
  }
}

function drawPlayerBarrier(x, y, w, h, layers, flash) {
  if (layers <= 0) return;
  const cx = x + w / 2;
  const cy = y + h / 2;
  const pulse = 0.82 + Math.sin(performance.now() * 0.008) * 0.18;
  const flashBoost = flash > 0 ? flash / 20 : 0;

  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (let i = 0; i < layers; i++) {
    const radiusX = w * 0.48 + i * 3.2;
    const radiusY = h * 0.52 + i * 3.5;
    const alpha = Math.min(0.95, (0.18 + i * 0.07) * pulse + flashBoost * 0.35);
    const hueShift = i >= 6 ? 45 : 0;
    ctx.strokeStyle = hueShift
      ? `rgba(255, ${210 - i * 4}, ${90 + i * 8}, ${alpha})`
      : `rgba(89, 215, 255, ${alpha})`;
    ctx.lineWidth = i === layers - 1 ? 2.4 : 1.6;
    ctx.beginPath();
    ctx.ellipse(cx, cy, radiusX, radiusY, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.fillStyle = `rgba(190, 235, 255, ${0.08 + flashBoost * 0.12})`;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w * 0.5 + layers * 3, h * 0.54 + layers * 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawWeaponStatus() {
  const entries = [];
  if (player.airWeaponTimer > 0) {
    entries.push({ label: "RAD BEAM", color: "#8f8", timer: player.airWeaponTimer, max: WEAPON_DURATION });
  }
  if (player.groundWeaponTimer > 0) {
    entries.push({ label: "FLAME", color: "#fa0", timer: player.groundWeaponTimer, max: WEAPON_DURATION });
  }
  if (player.missileWeaponTimer > 0) {
    entries.push({
      label: "FUNNEL Lv" + player.missileLevel,
      color: FUNNEL_ITEM_COLORS[(player.missileLevel || 1) - 1],
      timer: player.missileWeaponTimer,
      max: WEAPON_DURATION
    });
  }
  if (player.invincibleTimer > 0) {
    entries.push({ label: "INV STAR", color: "#ffe570", timer: player.invincibleTimer, max: INVINCIBLE_DURATION });
  }
  if (wildfire && wildfire.timer > 0) {
    entries.push({ label: "WILDFIRE", color: "#f80", timer: wildfire.timer, max: WILDFIRE_DURATION });
  }
  if (player.barrier > 0) {
    entries.push({ label: "BARRIER", color: "#59d7ff", segments: player.barrier, max: MAX_BARRIER });
  }
  if (!entries.length) return;

  let y = 38;
  for (const entry of entries) {
    ctx.fillStyle = "rgba(2, 6, 18, 0.72)";
    roundRect(8, y, 128, 18, 4);
    ctx.fill();
    ctx.fillStyle = entry.color;
    ctx.font = "9px monospace";
    ctx.fillText(entry.label, 14, y + 12);
    if (entry.timer != null) {
      const ratio = entry.timer / entry.max;
      ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
      roundRect(72, y + 6, 48, 6, 2);
      ctx.fill();
      ctx.fillStyle = entry.color;
      roundRect(72, y + 6, 48 * ratio, 6, 2);
      ctx.fill();
    } else {
      const segW = 5;
      const gap = 2;
      const totalW = entry.max * segW + (entry.max - 1) * gap;
      let sx = 118 - totalW;
      for (let i = 0; i < entry.max; i++) {
        ctx.fillStyle = i < entry.segments ? entry.color : "rgba(255, 255, 255, 0.12)";
        roundRect(sx + i * (segW + gap), y + 6, segW, 6, 1);
        ctx.fill();
      }
    }
    y += 22;
  }
}

function drawLayerLegend() {
  const alpha = getLegendAlpha();
  if (alpha <= 0) return;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = "rgba(2, 6, 18, 0.72)";
  roundRect(8, H - 56, 360, 56, 5);
  ctx.fill();

  ctx.fillStyle = "#35f4ff";
  ctx.fillRect(14, H - 43, 14, 3);
  ctx.fillStyle = "#eaffff";
  ctx.font = "10px monospace";
  ctx.fillText("AIR: SPACE", 32, H - 38);

  ctx.strokeStyle = "#ffe570";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(118, H - 40, 6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = "#ffe570";
  ctx.fillText("GROUND: X", 130, H - 38);

  ctx.fillStyle = "#8f8";
  ctx.fillRect(14, H - 24, 6, 6);
  ctx.fillStyle = "#ccc";
  ctx.font = "9px monospace";
  ctx.fillText("RAD", 24, H - 18);
  ctx.fillStyle = "#f80";
  ctx.beginPath();
  ctx.moveTo(58, H - 24);
  ctx.lineTo(64, H - 18);
  ctx.lineTo(52, H - 18);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = "#ccc";
  ctx.fillText("FLM", 68, H - 18);

  ctx.strokeStyle = "#59d7ff";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(104, H - 21, 4, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = "#ccc";
  ctx.fillText("B1", 112, H - 18);
  ctx.beginPath();
  ctx.arc(134, H - 21, 5, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(134, H - 21, 3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillText("B2", 142, H - 18);
  ctx.strokeStyle = "#ffe570";
  ctx.beginPath();
  ctx.arc(172, H - 21, 6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = "#ccc";
  ctx.fillText("B8", 182, H - 18);
  ctx.save();
  ctx.translate(214, H - 21);
  ctx.fillStyle = "#ffe570";
  ctx.fill(buildStarPath(6, 2.5));
  ctx.restore();
  ctx.fillStyle = "#ccc";
  ctx.fillText("STR", 228, H - 18);
  ctx.fillStyle = "#f80";
  ctx.beginPath();
  ctx.moveTo(252, H - 26);
  ctx.lineTo(258, H - 18);
  ctx.lineTo(246, H - 18);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = "#ff0";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(252, H - 26);
  ctx.lineTo(252, H - 30);
  ctx.moveTo(252, H - 26);
  ctx.lineTo(248, H - 22);
  ctx.moveTo(252, H - 26);
  ctx.lineTo(256, H - 22);
  ctx.stroke();
  ctx.fillStyle = "#ccc";
  ctx.fillText("WFR", 264, H - 18);

  for (let lv = 1; lv <= 4; lv++) {
    const lx = 118 + (lv - 1) * 34;
    ctx.save();
    ctx.translate(lx + 8, H - 12);
    ctx.fillStyle = FUNNEL_ITEM_COLORS[lv - 1];
    ctx.beginPath();
    ctx.moveTo(0, -5);
    ctx.lineTo(2.5, 4);
    ctx.lineTo(0, 2);
    ctx.lineTo(-2.5, 4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = "#aaa";
    ctx.font = "8px monospace";
    ctx.fillText("F" + lv, lx + 4, H - 6);
  }

  ctx.fillStyle = "#888";
  ctx.font = "8px monospace";
  ctx.fillText("F1〜F4=誘導弾Lv | WFR=山火事", 14, H - 6);
  ctx.restore();
}

function draw() {
  drawBackground();
  drawWildfireOverlay();

  for (const g of groundTargets) {
    if (g.alive) drawGroundTarget(g, worldToScreen(g.worldY));
  }

  for (const e of airEnemies) {
    if (e.alive) drawAirEnemy(e);
  }

  for (const item of items) drawPowerUp(item);

  drawZappers();

  ctx.fillStyle = "#ffe570";
  blasters.forEach(b => {
    ctx.strokeStyle = "rgba(255, 229, 112, 0.55)";
    ctx.beginPath();
    ctx.arc(b.x + b.w / 2, b.y + b.h / 2 + 13, 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(b.x + b.w / 2, b.y + b.h / 2, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  drawFlames();
  drawMissiles();

  drawEnemyBullets();

  if (!explosion) {
    if (player.invincibleTimer > 0) {
      drawInvincibleAura(player.x, player.y, player.w, player.h, player.invincibleTimer);
    }
    const blinkOff = player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 4) % 2 === 0;
    if (!blinkOff) {
      ctx.save();
      if (player.invincibleTimer > 0) ctx.globalAlpha = 0.82;
      drawPlayer(player.x, player.y, player.w, player.h, player.bank, player.afterburner, player.afterburnerFrame);
      ctx.restore();
    }
    drawPlayerBarrier(player.x, player.y, player.w, player.h, player.barrier, player.barrierFlash);
  }

  drawBursts();
  drawExplosion();

  ctx.fillStyle = "#0f0";
  ctx.font = "14px monospace";
  ctx.fillText("SCORE:" + score + "  WAVE:" + wave, 10, 22);
  drawWeaponStatus();
  drawLivesHUD();

  drawLayerLegend();

  if (gameOver) {
    ctx.fillStyle = "#0f0";
    ctx.textAlign = "center";
    ctx.font = "20px monospace";
    ctx.fillText("GAME OVER", W / 2, H / 2 - 10);
    ctx.font = "14px monospace";
    ctx.fillText("Press R to restart", W / 2, H / 2 + 20);
    ctx.textAlign = "left";
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "KeyX"].includes(e.code)) {
    e.preventDefault();
  }
  if (e.code === "KeyR" && gameOver) init(true);
});

document.addEventListener("keyup", e => {
  keys[e.code] = false;
});

init(true);
loop();
</script>
</body>
